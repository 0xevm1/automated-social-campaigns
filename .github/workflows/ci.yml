name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test -- --run --coverage --reporter=json --reporter=default --outputFile=test-results.json

      - name: Generate badges
        if: github.ref == 'refs/heads/main' && success()
        run: |
          TOTAL=$(jq '.numTotalTests' test-results.json)
          PASSED=$(jq '.numPassedTests' test-results.json)
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-summary.json)

          COV_COLOR="red"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COV_COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COV_COLOR="green"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COV_COLOR="yellow"
          fi

          if [ "$PASSED" = "$TOTAL" ]; then
            TEST_COLOR="brightgreen"
          else
            TEST_COLOR="red"
          fi

          mkdir -p badges
          curl -sf "https://img.shields.io/badge/tests-${PASSED}%2F${TOTAL}%20passing-${TEST_COLOR}" > badges/tests.svg
          curl -sf "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COV_COLOR}" > badges/coverage.svg

      - name: Commit badges
        if: github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --cached --quiet || (git commit -m "update test badges [skip ci]" && git push)
